[package]
name = "voice-channel-server"
version = "0.1.0"
edition = "2021"

[dependencies]
# Web framework
poem = { version = "3.0", features = ["compression", "static-files"] }
poem-openapi = { version = "5.0", features = ["chrono", "uuid"] }
tokio = { version = "1.0", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Database
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "postgres", "chrono", "uuid", "migrate", "macros"] }

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0"
thiserror = "1.0"

# Environment and configuration
dotenvy = "0.15"
clap = { version = "4.4", features = ["derive", "env"] }

# Async traits
async-trait = "0.1"

[dev-dependencies]
reqwest = { version = "0.11", features = ["json"] } 