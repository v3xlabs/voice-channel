version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: voice_channel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgres://postgres:password@postgres:5432/voice_channel
      - RUST_LOG=info
      - HOST=0.0.0.0
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages/server:/app
    working_dir: /app

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./packages/web:/app
      - /app/node_modules
    working_dir: /app
    environment:
      - VITE_API_URL=http://localhost:3001

volumes:
  postgres_data: 