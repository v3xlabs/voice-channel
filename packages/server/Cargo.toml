[package]
name = "voice-channel-server"
version = "0.1.0"
edition = "2021"

[dependencies]
# Web framework
poem = { version = "3.0", features = ["compression", "static-files", "websocket"] }
poem-openapi = { version = "5.0", features = ["chrono", "uuid"] }
tokio = { version = "1.0", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Database
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "postgres", "chrono", "uuid", "migrate", "macros"] }

# WebRTC and Media
mediasoup = "0.18"

# WebSocket and Real-time communication
tokio-tungstenite = "0.20"
futures-util = "0.3"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0"
thiserror = "1.0"
rand = "0.8"
num_cpus = "1.16"

# Environment and configuration
dotenvy = "0.15"
clap = { version = "4.4", features = ["derive", "env"] }

# Async traits
async-trait = "0.1"

# Collections for managing participants
dashmap = "5.5"

# WebAuthn and Authentication
webauthn-rs = "0.5"
webauthn-rs-proto = "0.5"
base64 = "0.22"

# Rate limiting
tower_governor = "0.3"
tower = { version = "0.4", features = ["util", "timeout", "load-shed", "limit"] }

[dev-dependencies]
reqwest = { version = "0.11", features = ["json"] } 
