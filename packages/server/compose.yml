version: '3.8'
name: voice-channel-dev

services:
  postgres:
    image: postgres:15
    container_name: voice-channel-dev-postgres
    environment:
      POSTGRES_DB: voice_channel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for future caching/session management if needed
  redis:
    image: redis:7-alpine
    container_name: voice-channel-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
    name: voice-channel-dev-postgres-data
  redis_dev_data:
    name: voice-channel-dev-redis-data 